<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keycap Clicker</title>
<style>
  * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, #1a1a2e, #16213e);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    color: #f0f0f5;
    overflow-x: hidden;
  }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 32px; letter-spacing: 0.5px; }
  .keyboard-grid {
    display: flex;
    gap: 28px;
    justify-content: center;
  }
  .key {
    width: 130px;
    height: 130px;
    border-radius: 22px;
    background: linear-gradient(180deg, #46465e, #2c2c40);
    border-bottom: 8px solid rgba(23,23,35,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transform: translateY(0);
    transition: transform 0.05s ease-out, border-bottom-width 0.05s ease-out, box-shadow 0.15s;
    box-shadow: 0 6px 0 rgba(0,0,0,0.35);
  }
  .key::after {
    content: '';
    width: 40%;
    height: 40%;
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
  }
  .key.pressed {
    transform: translateY(8px);
    border-bottom-width: 1px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.35), 0 0 26px rgba(150,150,255,0.6);
  }
  .key .glow {
    position: absolute;
    inset: -6px;
    border-radius: 22px;
    opacity: 0;
    background: radial-gradient(circle, rgba(160,160,255,0.5), transparent 70%);
    pointer-events: none;
  }
  .key.pop .glow { animation: popGlow 0.4s ease-out forwards; }
  @keyframes popGlow {
    0% { opacity: 0.9; transform: scale(0.6); }
    100% { opacity: 0; transform: scale(1.6); }
  }
  .streak {
    margin-top: 22px;
    font-size: 13px;
    color: #9a9ac0;
    height: 18px;
  }
</style>
</head>
<body>

<h1>keycap clicker</h1>
<div class="keyboard-grid" id="keyboardGrid"></div>
<div class="streak" id="streak"></div>

const POOL_SIZE = 6;
const pool = [];
for (let i = 0; i < POOL_SIZE; i++){
  const a = new Audio(CLICK_SRC);
  a.preload = 'auto';
  pool.push(a);
}
let poolIndex = 0;
function playClick(){
  const a = pool[poolIndex];
  poolIndex = (poolIndex + 1) % POOL_SIZE;
  try { a.currentTime = 0; a.play(); } catch(e) {}
}
const keyCount = 2;
const grid = document.getElementById('keyboardGrid');
let streakCount = 0, streakTimer = null;
for (let i = 0; i < keyCount; i++){
  const key = document.createElement('div');
  key.className = 'key';
  key.innerHTML = '<span class="glow"></span>';
  key.addEventListener('pointerdown', () => {
    key.classList.add('pressed');
    playClick();
    streakCount++;
    document.getElementById('streak').textContent = streakCount > 2 ? streakCount + ' clicks' : '';
    clearTimeout(streakTimer);
    streakTimer = setTimeout(() => { streakCount = 0; document.getElementById('streak').textContent=''; }, 900);
  });
  const release = () => {
    key.classList.remove('pressed');
    key.classList.add('pop');
    setTimeout(() => key.classList.remove('pop'), 400);
  };
  key.addEventListener('pointerup', release);
  key.addEventListener('pointerleave', () => key.classList.remove('pressed'));
  grid.appendChild(key);
}
</script>
